<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愛宕ピアノ教室｜福岡市西区の個人ピアノ教室</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 基本スタイル：全デバイスで崩れないように設定 */
        /* body {
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 2.0;
            color: #333;
            background-color: #f9f7f5;
            margin: 0;
            padding: 0;
            letter-spacing: 0.05em;
        } */

        /* 背景の設定：各セクションに背景を持たせるため、bodyからは削除 */
        body {
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 2.0;
            color: #333;
            margin: 0;
            padding: 0;
            letter-spacing: 0.05em;
        }

        header { text-align: center; padding: 100px 20px; }
        header h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.2em; margin-bottom: 10px; }

        /* セクション：最大幅を制限して崩れを防ぐ
        section { padding: 80px 20px; max-width: 600px; margin: auto; } */
        
        //* 1. sectionは背景を広げるため、最大幅の制限をなくします */
        section {
            padding: 100px 20px;
            /* max-width: 600px;  <-- これを削除または拡大 */
            width: 100%;        /* 画面いっぱいに広げる */
            box-sizing: border-box; /* パディングを含めてサイズ計算 */
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
        }

        /* 2. 中身のコンテンツだけを中央に寄せるための容器を作る */
        .container {
            max-width: 800px;   /* 文字の読みやすさを保つ幅 */
            margin: 0 auto;     /* 中央寄せ */
        }

        /* セクションごとの背景設定 */
        #about { background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('images/1.jpg'); }
        #features { background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('images/2.jpg'); }
        #lesson { background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('images/3.jpg'); }

        h2 { font-size: 1.2rem; text-align: center; font-weight: 400; margin-bottom: 50px; letter-spacing: 0.2em; }

        /* .card { border-bottom: 1px solid #e0e0e0; padding-bottom: 40px; } */

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* グリッド：スマホで縦並び、PCで横並び */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .price-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .price-table th, .price-table td { padding: 12px 0; border-bottom: 1px solid #e0e0e0; text-align: left; }

        .btn-primary { 
            display: block; background: #333; color: #fff; text-align: center; 
            padding: 15px; text-decoration: none; max-width: 250px; margin: 40px auto;
        }

        footer { text-align: center; padding: 60px 20px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>愛宕ピアノ教室</h1>
    <p>福岡市西区で心豊かな音楽の時間を。</p>
</header>

<<section id="about">
    <div class="container">
        <h2>教室について</h2>
        <div class="card">
            </div>
    </div>
</section>

<section id="features">
    <div class="container">
        <h2>教室の特長</h2>
        <div class="grid">
            </div>
    </div>
</section>

<section id="lesson">
    <h2>レッスン料金</h2>
    <div class="card">
        <p style="text-align: center; font-size: 0.9rem;">入会金：5,000円（税込）</p>
        <table class="price-table">
            <tr><th>コース</th><th>月謝（税込）</th></tr>
            <tr><td>ピアノ（30分・年40回）</td><td>7,500円</td></tr>
            <tr><td>ピアノ（45分・年40回）</td><td>9,500円</td></tr>
            <tr><td>幼児音楽（月3回）</td><td>6,000円</td></tr>
        </table>
    </div>
</section>

<section id="contact">
    <h2>無料体験レッスン</h2>
    <a href="YOUR_GOOGLE_FORM_URL" class="btn-primary">体験レッスンに申し込む</a>
</section>

<footer>
    <p>福岡市西区愛宕｜地下鉄「室見駅」より徒歩5分<br>
    営業時間：平日 10:00〜20:00 / 土日祝 10:00〜18:00（水曜定休）</p>
</footer>

</body>
<!-- <div class="fixed-background"></div> -->
</html>
